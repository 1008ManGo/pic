version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sms_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: sms_platform
      MYSQL_USER: sms_user
      MYSQL_PASSWORD: sms_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sms_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sms_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sms_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  go_gateway:
    image: workspace-go_gateway:latest
    container_name: sms_go_gateway
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./sms-gateway/configs:/app/configs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sms_network

  php_app:
    image: workspace-php_app:latest
    container_name: sms_php_app
    restart: always
    ports:
      - "15789:80"
    volumes:
      - ./app/php:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - go_gateway
    networks:
      - sms_network

volumes:
  mysql_data:
  redis_data:

networks:
  sms_network:
    driver: bridge
